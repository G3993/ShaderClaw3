<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>ShaderClaw3</title>
<link rel="icon" href="logo.svg" type="image/svg+xml">

<!-- CodeMirror -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/material-darker.min.css">

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Libre+Caslon+Text:ital,wght@0,400;0,700;1,400&family=Outfit:wght@100..900&display=swap" rel="stylesheet">

<!-- ShaderClaw CSS -->
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/reset.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/toolbar.css">
<link rel="stylesheet" href="css/viewport.css">
<link rel="stylesheet" href="css/assets.css">
<link rel="stylesheet" href="css/properties.css">
<link rel="stylesheet" href="css/controls.css">
<link rel="stylesheet" href="css/timeline.css">
<link rel="stylesheet" href="css/modals.css">
</head>

<body>

<div id="app">

  <!-- ===== VERTICAL ELEMENT TOOLBAR (left edge) ===== -->
  <nav class="sc3-toolbar-strip">
    <button class="sc3-tool" data-panel="assets" data-tooltip="Assets">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <span class="sc3-tool-label">Assets</span>
    </button>
    <button class="sc3-tool" data-panel="gallery" data-tooltip="Gallery (G)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      <span class="sc3-tool-label">Gallery</span>
    </button>
    <button class="sc3-tool" data-panel="code" data-tooltip="Code Editor (E)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
      <span class="sc3-tool-label">Code</span>
    </button>
    <div class="sc3-tool-sep"></div>
    <button class="sc3-tool" data-panel="properties" data-tooltip="Properties (P)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      <span class="sc3-tool-label">Props</span>
    </button>
  </nav>

  <!-- ===== FLOATING TOP BAR ===== -->
  <header class="sc3-header">
    <div class="sc3-logo"><img src="logo.svg" alt="ShaderClaw" class="sc3-logo-img">ShaderClaw</div>
    <div class="sc3-header-actions">
    </div>
  </header>

  <!-- Mobile floating controls (voice, camera, data, content) -->
  <div class="sc3-mobile-inputs" id="mobile-inputs">
    <button class="sc3-mobile-input-btn" data-target="canvas-mic-btn" title="Voice">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
    </button>
    <button class="sc3-mobile-input-btn" data-target="cam-vis-btn" title="Camera">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
    </button>
    <button class="sc3-mobile-input-btn" data-target="data-source-btn" title="Data">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>
    </button>
    <button class="sc3-mobile-input-btn" data-target="content-source-btn" title="Content">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="2"/><path d="M10 8l6 4-6 4V8z"/></svg>
    </button>
  </div>

  <!-- Mobile panel toggle button -->
  <button class="sc3-mobile-toggle" id="mobile-panel-toggle" title="Show panel">
    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18 15 12 9 6 15"/></svg>
  </button>

  <!-- ===== EXPORT HUB DROPDOWN ===== -->
  <div id="export-hub">
    <div class="export-hub-grid">
      <button data-action="window" class="export-tile">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
        <span>Window</span>
      </button>
      <button data-action="screenshot" class="export-tile">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="12" cy="13" r="4"/><path d="M5 3L3 5"/></svg>
        <span>Screenshot</span>
      </button>
      <button data-action="gif" class="export-tile">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="20" height="20" rx="2"/><text x="12" y="15" text-anchor="middle" font-size="8" fill="currentColor" stroke="none">GIF</text></svg>
        <span>GIF</span>
      </button>
      <button data-action="video" class="export-tile">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
        <span>Video</span>
      </button>
      <button data-action="ndi" class="export-tile">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 12h4l3-9 3 18 3-9h4"/></svg>
        <span>NDI</span>
      </button>
      <button data-action="copy" class="export-tile">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
        <span>Copy .fs</span>
      </button>
      <button data-action="download" class="export-tile">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        <span>Download</span>
      </button>
    </div>
  </div>

  <!-- ===== LEFT: SOURCES PANEL (floating, hidden by default) ===== -->
  <aside class="sc3-sources sc3-panel" id="sidebar">
    <div id="sidebar-scroll">

    <!-- Gallery Section -->
    <div id="gallery-tab-content" class="sc3-section">
      <div class="sc3-section-header" data-section="gallery">
        <span class="sc3-section-chevron">&#x25BC;</span> Gallery
      </div>
      <div class="sc3-section-body" style="padding: 8px;">
        <input type="text" class="gallery-search" id="gallery-search" placeholder="Search shaders...">
        <div class="gallery-grid" id="gallery-grid"></div>
      </div>
    </div>

    <!-- Code Editor -->
    <div class="sc3-section" id="editor-section">
      <div class="sc3-section-header" data-section="code">
        <span class="sc3-section-chevron">&#x25BC;</span> Code
      </div>
      <div class="sc3-section-body sc3-editor-body">
        <div id="editor-toolbar" class="sc3-editor-toolbar">
          <button id="compile-btn">Compile</button>
          <label id="auto-compile-label"><input type="checkbox" id="auto-compile" checked> Auto</label>
          <div class="spacer"></div>
          <button id="new-btn">New</button>
          <button id="download-btn">Save .fs</button>
        </div>
        <div id="editor-area">
          <div id="editor-wrap"><textarea id="code"></textarea></div>
        </div>
      </div>
    </div>

    <!-- Assets Section -->
    <div id="inputs-section" class="open assets-panel sc3-section">
      <!-- Visible content tile grid (always shown) -->
      <div class="sc3-content-grid" id="content-grid">
        <button class="sc3-content-tile" data-type="image">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
          <span>Image</span>
        </button>
        <button class="sc3-content-tile" data-type="video">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="23 7 16 12 23 17"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
          <span>Video</span>
        </button>
        <button class="sc3-content-tile" data-type="model">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
          <span>3D Model</span>
        </button>
        <button class="sc3-content-tile" data-type="sound">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19"/><path d="M15.54 8.46a5 5 0 010 7.07"/><path d="M19.07 4.93a10 10 0 010 14.14"/></svg>
          <span>Audio</span>
        </button>
        <button class="sc3-content-tile" data-type="overlay">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="20" height="20" rx="2"/><rect x="7" y="7" width="10" height="10" rx="1" stroke-dasharray="2 1.5"/></svg>
          <span>Overlay</span>
        </button>
        <button class="sc3-content-tile" data-type="file">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          <span>File</span>
        </button>
      </div>
      <input type="file" id="data-file-input" accept=".md,.txt,.json,.csv,.xml,.yml,.yaml" style="display:none">
      <!-- Hidden old elements kept for JS compat -->
      <div style="display:none">
        <div class="asset-add-wrap">
          <button class="asset-add-btn" id="asset-add-btn">+ ADD CONTENT</button>
          <div class="asset-add-menu" id="asset-add-menu">
            <button class="asset-add-option" data-type="image">Image</button>
            <button class="asset-add-option" data-type="video">Video</button>
            <button class="asset-add-option" data-type="model">3D Model</button>
            <button class="asset-add-option" data-type="sound">Sound</button>
            <button class="asset-add-option" data-type="mic">Mic</button>
            <button class="asset-add-option" data-type="webcam">Webcam</button>
            <button class="asset-add-option" data-type="ndi">NDI</button>
            <button class="asset-add-option" data-type="code">Code</button>
          </div>
        </div>
      </div>

      <!-- Overlay -->
      <div class="sc3-layer-btn-row">
        <div class="layer-card sc3-layer-btn" data-layer="overlay">
          <div class="layer-header">
            <span class="sc3-layer-btn-icon">+</span>
            <span class="layer-name">Overlay</span>
          </div>
          <div class="layer-controls">
            <div class="layer-control-row">
              <button class="asset-add-btn" id="overlay-upload-btn" title="Upload image or GIF">+ ADD OVERLAY</button>
            </div>
            <div id="overlay-file-info" class="overlay-file-info" style="display:none">
              <span class="overlay-file-icon"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></span>
              <span id="overlay-file-name" class="overlay-file-name"></span>
              <button id="overlay-file-remove" class="overlay-file-remove" title="Remove image">&times;</button>
            </div>
            <div class="layer-control-row">
              <label>X</label>
              <input type="range" id="overlay-tx" min="-1" max="1" step="0.01" value="0">
              <span class="val" id="overlay-tx-val">0.00</span>
            </div>
            <div class="layer-control-row">
              <label>Y</label>
              <input type="range" id="overlay-ty" min="-1" max="1" step="0.01" value="0">
              <span class="val" id="overlay-ty-val">0.00</span>
            </div>
            <div class="layer-control-row">
              <label>Scale</label>
              <input type="range" id="overlay-scale" min="0.1" max="5" step="0.01" value="0.3">
              <span class="val" id="overlay-scale-val">0.30</span>
            </div>
            <div class="layer-control-row">
              <label>Rotate</label>
              <input type="range" id="overlay-rotate" min="-180" max="180" step="1" value="0">
              <span class="val" id="overlay-rotate-val">0&#176;</span>
            </div>
            <div class="layer-control-row">
              <label>Opacity</label>
              <input type="range" class="layer-opacity" data-layer="overlay" min="0" max="1" step="0.01" value="1">
              <span class="val">1.00</span>
            </div>
            <div class="layer-control-row">
              <label>Blend</label>
              <select class="layer-blend" data-layer="overlay">
                <option value="normal">Normal</option>
                <option value="add">Add</option>
                <option value="multiply">Multiply</option>
                <option value="screen">Screen</option>
                <option value="overlay">Overlay</option>
              </select>
            </div>
          </div>
        </div>
      </div>

      <!-- Hidden select for handler compat -->
      <select id="input-add-select" style="display:none">
        <option value="" disabled selected>+ Add</option>
        <option value="image">Image</option>
        <option value="video">Video</option>
        <option value="model">3D Model</option>
        <option value="sound">Sound</option>
        <option value="mic">Mic</option>
        <option value="webcam">Webcam</option>
        <option value="ndi">NDI</option>
        <option value="code">Code</option>
      </select>
      <!-- Hidden tiles for handler compat -->
      <div class="import-grid" style="display:none">
        <button class="import-tile" id="tile-image"></button>
        <button class="import-tile" id="tile-video"></button>
        <button class="import-tile" id="tile-model"></button>
        <button class="import-tile" id="tile-sound"></button>
        <button class="import-tile" id="tile-mic"></button>
        <button class="import-tile" id="tile-webcam"></button>
        <button class="import-tile" id="tile-ndi"></button>
        <button class="import-tile" id="tile-code"></button>
      </div>
      <div class="assets-list" id="media-list"></div>
    </div>

    <!-- Export Tab Content (hidden, kept for JS compat) -->
    <div id="export-tab-content" style="display:none"></div>

    </div><!-- /sidebar-scroll -->
  </aside>

  <!-- NDI Source Picker (modal — must be outside hidden panels) -->
  <div id="ndi-source-picker">
    <div class="picker-box">
      <div class="picker-header">
        <span class="title">NDI Sources</span>
        <button class="picker-close" id="ndi-picker-close">&times;</button>
      </div>
      <div class="picker-body" id="ndi-picker-body"></div>
      <button class="ndi-refresh-btn" id="ndi-refresh-btn">Refresh Sources</button>
    </div>
  </div>

  <!-- ===== CENTER: CANVAS (fills viewport) ===== -->
  <main class="sc3-canvas" id="main">
    <div id="preview">
      <canvas id="gl-canvas"></canvas>
      <canvas id="three-canvas"></canvas>
      <canvas id="overlay-gizmo"></canvas>
      <div class="canvas-controls">
        <div class="ndi-indicator" id="ndi-indicator"><span class="ndi-dot"></span><span class="ndi-label">NDI</span></div>
        <button class="canvas-btn" id="play-btn" title="Play/Pause"><svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg></button>
        <button class="canvas-btn export-btn" id="export-hub-btn" title="Export"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v7a2 2 0 002 2h12a2 2 0 002-2v-7"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg></button>
        <button class="canvas-btn" id="pip-btn" title="Picture-in-Picture"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><rect x="11" y="9" width="10" height="7" rx="1" fill="currentColor" opacity="0.3"/><rect x="11" y="9" width="10" height="7" rx="1"/></svg></button>
        <button class="canvas-btn" id="fs-btn" title="Fullscreen">&#x26F6;</button>
        <div class="audio-level-indicator" id="audio-level-indicator">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 010 7.07"/><path d="M19.07 4.93a10 10 0 010 14.14"/></svg>
          <div class="audio-level-track"><span class="audio-level-fill" id="audio-level-fill"></span></div>
        </div>
      </div>
      <div id="error-bar" data-init="1"></div>
      <div id="debug-overlay" style="display:none;pointer-events:none"></div>
      <!-- Hidden file inputs (must exist for JS) -->
      <input type="file" id="image-file-input" accept="image/jpeg,image/png,image/gif,image/webp" multiple style="display:none">
      <input type="file" id="video-file-input" accept="video/mp4,video/webm" multiple style="display:none">
      <input type="file" id="model-file-input" accept=".glb,.gltf,.stl,.fbx,.obj" multiple style="display:none">
      <input type="file" id="sound-file-input" accept="audio/mpeg,audio/wav,audio/ogg,.mp3,.wav,.ogg" multiple style="display:none">
      <input type="file" id="vector-file-input" accept=".svg,image/svg+xml" style="display:none">
      <input type="file" id="code-file-input" accept=".fs,.glsl,.frag,.txt" style="display:none">
      <input type="file" id="bg-image-input" accept="image/*" style="display:none">
      <input type="file" id="bg-video-input" accept="video/*" style="display:none">
    </div>

    <!-- Claude Chat Bar -->
    <div class="sc3-chat-bar">
      <div class="sc3-chat-attachment" style="display:none">
        <img class="sc3-chat-attachment-thumb" src="" alt="ref">
        <button class="sc3-chat-attachment-remove" title="Remove image">&times;</button>
      </div>
      <input type="file" class="sc3-chat-ref-input" accept="image/*" style="display:none">
      <button class="sc3-chat-ref-btn" title="Attach reference image"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></button>
      <input type="text" class="sc3-chat-input" placeholder="Ask Claude to modify your shader...">
      <button class="sc3-chat-send">&#x21B5;</button>
    </div>
    <div class="sc3-chat-history"></div>

    <!-- Shader Browser Overlay -->
    <div id="shader-browser-backdrop"></div>
    <div id="shader-browser">
      <div class="browser-header">
        <input class="browser-search" type="text" placeholder="Search shaders...">
        <button class="browser-close">&#x2715;</button>
      </div>
      <div class="browser-body"></div>
    </div>

    <!-- Mobile drag handle -->
    <div id="mobile-drag-handle"><span class="drag-pill"></span></div>
  </main>

  <!-- ===== RIGHT: UNIFIED PANEL (tabs + content) ===== -->
  <aside class="sc3-properties sc3-panel visible">
    <div class="sc3-panel-pill" id="panel-pill"><span class="drag-pill"></span></div>
    <div class="sc3-properties-resize" id="properties-resize"></div>
    <div id="sidebar-resize" style="display:none"></div>

    <!-- Tab Bar -->
    <nav class="sc3-tab-bar">
      <button class="sc3-tab active" data-tab="canvas">Controls</button>
      <button class="sc3-tab" data-tab="assets">Assets</button>
      <button class="sc3-tab" data-tab="gallery">Gallery</button>
    </nav>

    <!-- Tab Content: Controls (properties) -->
    <div class="sc3-tab-content active" data-tab-content="canvas">

    <!-- Background (hidden — shader has its own bg/color controls) -->

              </button>
              <input type="color" class="sc3-layer-color-picker" data-layer="scene" value="#000000" style="position:absolute;opacity:0;pointer-events:none;width:0;height:0;">

              <div class="layer-control-row">
                <label>Opacity</label>

                <label>Blend</label>

              </div>
              <div class="layer-control-row">
                <button id="scene-model-btn" title="Import 3D model (.glb, .gltf, .stl, .fbx, .obj)">+ Add 3D Model</button>

            </div>
            <div class="layer-colors" data-layer="scene"></div>
            <div class="layer-params" data-layer="scene"></div>
          </div>
        </div>
      </div>

<script>
// Diagnostic reporter
(function(){
  var _errs = [];
  var isMob = window.innerWidth <= 900 || /Mobi|Android|iPhone/i.test(navigator.userAgent);
  window.addEventListener('error', function(e) { _errs.push(e.message + ' at ' + (e.filename||'') + ':' + e.lineno); });
  window.addEventListener('unhandledrejection', function(e) { _errs.push('Promise: ' + (e.reason && e.reason.message || e.reason)); });
  setTimeout(function() {
    var gl = document.getElementById('gl-canvas');
    var ctx = gl && gl.getContext('webgl');
    var diag = {
      errors: _errs,
      canvasSize: gl ? [gl.width, gl.height] : null,
      glLost: ctx ? ctx.isContextLost() : 'no ctx',
      debugText: (document.getElementById('debug-overlay') || {}).textContent || '',
      errorBar: (document.getElementById('error-bar') || {}).textContent || '',
      title: document.title,
      ua: navigator.userAgent,
      screen: window.innerWidth + 'x' + window.innerHeight
    };
    fetch('/api/diag', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(diag) }).catch(function(){});
  }, 5000);
})();
</script>
