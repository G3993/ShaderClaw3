<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<style>
  html, body { margin: 0; padding: 0; background: #000; overflow: hidden; height: 100%; }
  canvas { display: block; width: 100vw; height: 100vh; }
  #msg { color: #555; font: 11px -apple-system, sans-serif; padding: 8px; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script src="isf.js"></script>
<script>
// ============================================================
// EaselMobile shader preview — ShaderClaw pipeline edition.
// Uses the same buildFragmentShader() as ShaderClaw3/Easel web,
// so every library shader (incl. multipass, text, audio bus)
// renders identically to the desktop app.
// Native hooks:
//   window.__SHADER_SRC__            — shader source (injected at doc start)
//   window.__setAudio(l, b, m, h)    — live audio levels from native
//   window.__setAudioFFT(Uint8Array/Array 256) — optional FFT bins
// ============================================================
var src = window.__SHADER_SRC__ || "";
var canvas = document.getElementById("c");

function post(t) { try { window.webkit.messageHandlers.shaderlog.postMessage(String(t)); } catch (e) {} }
window.onerror = function (m, s, l, c, err) { post("onerror: " + m + (err && err.stack ? " | " + err.stack : "")); };
function fail(t) { post("FAIL: " + (t || "preview unavailable")); document.body.innerHTML = '<div id="msg">' + (t || "preview unavailable") + '</div>'; }

var DPR = Math.min(window.devicePixelRatio || 1, 2);
function fit() {
  canvas.width = Math.max(1, Math.floor(canvas.clientWidth * DPR));
  canvas.height = Math.max(1, Math.floor(canvas.clientHeight * DPR));
}
fit();

var gl = canvas.getContext("webgl", { antialias: false, premultipliedAlpha: false, preserveDrawingBuffer: false })
      || canvas.getContext("experimental-webgl");
if (!gl) { fail("no webgl"); }
else if (!src) { fail("no shader source"); }
else main();

function main() {
  gl.getExtension('OES_standard_derivatives');
  var extHF = gl.getExtension('OES_texture_half_float');
  gl.getExtension('OES_texture_half_float_linear');

  var built;
  try { built = buildFragmentShader(src); }
  catch (e) { return fail("parse: " + e.message); }
  var parsed = built.parsed;

  function compile(type, s) {
    var sh = gl.createShader(type);
    gl.shaderSource(sh, s); gl.compileShader(sh);
    if (!gl.getShaderParameter(sh, gl.COMPILE_STATUS)) {
      var log = gl.getShaderInfoLog(sh); gl.deleteShader(sh);
      return { err: log };
    }
    return { sh: sh };
  }
  var vs = compile(gl.VERTEX_SHADER, VERT_SHADER);
  if (vs.err) return fail("vert: " + vs.err);
  var fs = compile(gl.FRAGMENT_SHADER, built.frag);
  if (fs.err) return fail("frag: " + fs.err);
  var prog = gl.createProgram();
  gl.attachShader(prog, vs.sh); gl.attachShader(prog, fs.sh); gl.linkProgram(prog);
  if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) return fail("link: " + gl.getProgramInfoLog(prog));
  gl.useProgram(prog);
  post("compiled ok");

  // Quad
  var quad = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, quad);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
  var posLoc = gl.getAttribLocation(prog, 'position');
  gl.enableVertexAttribArray(posLoc);
  gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 0, 0);

  // Uniform census
  var uniforms = {};
  var nu = gl.getProgramParameter(prog, gl.ACTIVE_UNIFORMS);
  for (var i = 0; i < nu; i++) {
    var info = gl.getActiveUniform(prog, i);
    var name = info.name.replace(/\[0\]$/, '');
    uniforms[name] = { type: info.type, loc: gl.getUniformLocation(prog, info.name) };
  }

  // Inputs / text defaults
  var inputDefaults = {}, textVals = {};
  (parsed.inputs || []).forEach(function (inp) {
    inputDefaults[inp.NAME] = inp;
    if (inp.TYPE === 'text') {
      // App convention: atlas indices (A-Z=0-25, space=26, 0-9=27-36)
      var m = ((typeof inp.DEFAULT === 'string' && inp.DEFAULT.trim()) || 'ETHEREA').toUpperCase();
      var maxLen = inp.MAX_LENGTH || 12;
      for (var i = 0; i < maxLen; i++) {
        var ch = m[i], v = 26;
        if (ch && ch !== ' ') {
          var code = ch.charCodeAt(0);
          if (code >= 65 && code <= 90) v = code - 65;
          else if (code >= 48 && code <= 57) v = code - 48 + 27;
        }
        textVals[inp.NAME + '_' + i] = v;
      }
      textVals[inp.NAME + '_len'] = Math.min(m.replace(/\s+$/, '').length, maxLen);
    }
  });

  function makeTexParams() {
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  }

  // Neutral dark texture for unbound image inputs (video not wired in preview)
  var blackTex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, blackTex);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, 1, 1, 0, gl.RGBA, gl.UNSIGNED_BYTE, new Uint8Array([0, 0, 0, 255]));
  makeTexParams();

  // Font atlas (same layout as js/media.js updateFontAtlas: 37 cells A-Z,space,0-9)
  var fontAtlasTex = (function () {
    var cellW = 96, cellH = 90;
    var c = document.createElement('canvas');
    c.width = 37 * cellW; c.height = cellH;
    var ctx = c.getContext('2d');
    ctx.translate(0, c.height); ctx.scale(1, -1);
    ctx.font = '400 ' + Math.round(cellH * 0.85) + 'px -apple-system, sans-serif';
    ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    for (var i = 0; i < 26; i++) ctx.fillText(String.fromCharCode(65 + i), (i + 0.5) * cellW, cellH / 2);
    for (var d = 0; d < 10; d++) ctx.fillText(String(d), (27 + d + 0.5) * cellW, cellH / 2);
    var t = gl.createTexture();
    gl.bindTexture(gl.TEXTURE_2D, t);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, c);
    makeTexParams();
    return t;
  })();

  // varFontTex — default message
  var varFontTex = (function () {
    var c = document.createElement('canvas');
    c.width = 512; c.height = 128;
    var ctx = c.getContext('2d');
    ctx.translate(0, c.height); ctx.scale(1, -1);
    ctx.font = '700 90px -apple-system, sans-serif';
    ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('ETHEREA', c.width / 2, c.height / 2);
    var t = gl.createTexture();
    gl.bindTexture(gl.TEXTURE_2D, t);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, c);
    makeTexParams();
    return t;
  })();

  // --- Audio: native-fed with graceful synthetic idle -----------------------
  var audio = { level: 0, bass: 0, mid: 0, high: 0, nativeFed: false };
  var fftBins = new Uint8Array(256);
  var fftTex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, fftTex);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.LUMINANCE, 256, 1, 0, gl.LUMINANCE, gl.UNSIGNED_BYTE, fftBins);
  makeTexParams();

  window.__setAudio = function (l, b, m, h) {
    audio.nativeFed = true;
    audio.level = l || 0; audio.bass = b || 0; audio.mid = m || 0; audio.high = h || 0;
  };
  window.__setAudioFFT = function (bins) {
    try {
      for (var i = 0; i < 256 && i < bins.length; i++) fftBins[i] = bins[i];
      gl.bindTexture(gl.TEXTURE_2D, fftTex);
      gl.texImage2D(gl.TEXTURE_2D, 0, gl.LUMINANCE, 256, 1, 0, gl.LUMINANCE, gl.UNSIGNED_BYTE, fftBins);
    } catch (e) {}
  };

  function syntheticAudio(t) {
    // Gentle musical idle so audio-reactive shaders breathe in the rail
    var beat = Math.pow(Math.max(0, Math.sin(t * Math.PI * 2 * 1.833)), 8.0); // ~110bpm
    audio.bass = 0.18 + 0.35 * beat;
    audio.mid = 0.15 + 0.12 * (0.5 + 0.5 * Math.sin(t * 2.7));
    audio.high = 0.10 + 0.10 * (0.5 + 0.5 * Math.sin(t * 5.3 + 1.0));
    audio.level = (audio.bass + audio.mid + audio.high) / 3 * 1.4;
    for (var i = 0; i < 256; i++) {
      var f = i / 256;
      fftBins[i] = Math.max(0, Math.min(255, 255 * audio.level * (1.0 - f * 0.8) * (0.7 + 0.3 * Math.sin(f * 37 + t * 3))));
    }
    gl.bindTexture(gl.TEXTURE_2D, fftTex);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.LUMINANCE, 256, 1, 0, gl.LUMINANCE, gl.UNSIGNED_BYTE, fftBins);
  }

  // Derived bus values (subset of js/audio.js feature bus)
  var busPrevBass = 0, beatPulse = 0, lastT = 0;
  function busValues(t) {
    var dt = Math.min(0.1, Math.max(0.001, t - lastT)); lastT = t;
    var punch = Math.max(0, audio.bass - busPrevBass) * 8;
    busPrevBass = busPrevBass * 0.75 + audio.bass * 0.25;
    if (punch > 0.35) beatPulse = 1;
    beatPulse *= Math.exp(-dt * 6);
    return {
      audioPunch: Math.min(1, punch), audioOnset: Math.min(1, punch),
      audioBeat: beatPulse > 0.95 ? 1 : 0, audioBeatPulse: beatPulse,
      audioEnergy: audio.level, audioBrightness: 0.3 + audio.high * 0.6,
      audioSub: audio.bass, audioLowMid: audio.mid, audioHighMid: audio.mid, audioTreble: audio.high,
    };
  }

  // --- Touch → mouse uniforms ------------------------------------------------
  var mouse = { x: 0.5, y: 0.5, dx: 0, dy: 0, down: 0 };
  function touchPos(e) {
    var t = e.touches && e.touches[0];
    if (!t) return;
    var nx = t.clientX / canvas.clientWidth;
    var ny = 1.0 - t.clientY / canvas.clientHeight;
    mouse.dx = nx - mouse.x; mouse.dy = ny - mouse.y;
    mouse.x = nx; mouse.y = ny;
  }
  canvas.addEventListener('touchstart', function (e) { mouse.down = 1; touchPos(e); }, { passive: true });
  canvas.addEventListener('touchmove', function (e) { touchPos(e); }, { passive: true });
  canvas.addEventListener('touchend', function () { mouse.down = 0; mouse.dx = mouse.dy = 0; }, { passive: true });

  // --- Multipass targets -----------------------------------------------------
  var passes = (parsed.meta && Array.isArray(parsed.meta.PASSES) && parsed.meta.PASSES.length) ? parsed.meta.PASSES : [{}];
  var targets = {};
  function makeFBO(w, h, half) {
    var tex = gl.createTexture();
    gl.bindTexture(gl.TEXTURE_2D, tex);
    var type = (half && extHF) ? extHF.HALF_FLOAT_OES : gl.UNSIGNED_BYTE;
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, w, h, 0, gl.RGBA, type, null);
    makeTexParams();
    var fbo = gl.createFramebuffer();
    gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
    gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex, 0);
    var ok = gl.checkFramebufferStatus(gl.FRAMEBUFFER) === gl.FRAMEBUFFER_COMPLETE;
    gl.bindFramebuffer(gl.FRAMEBUFFER, null);
    if (!ok && half) { gl.deleteFramebuffer(fbo); gl.deleteTexture(tex); return makeFBO(w, h, false); }
    return { fbo: fbo, tex: tex };
  }
  function allocTargets() {
    for (var k in targets) {
      gl.deleteFramebuffer(targets[k].front.fbo); gl.deleteTexture(targets[k].front.tex);
      gl.deleteFramebuffer(targets[k].back.fbo); gl.deleteTexture(targets[k].back.tex);
    }
    targets = {};
    passes.forEach(function (p) {
      if (p.TARGET && !targets[p.TARGET]) {
        targets[p.TARGET] = {
          front: makeFBO(canvas.width, canvas.height, !!p.FLOAT || !!p.PERSISTENT),
          back: makeFBO(canvas.width, canvas.height, !!p.FLOAT || !!p.PERSISTENT),
        };
      }
    });
  }
  allocTargets();
  window.addEventListener('resize', function () { fit(); allocTargets(); });

  var start = performance.now();
  var frameIndex = 0;
  var drawErr = null;

  function setUniforms(t, dt, pi) {
    var unit = 0;
    var bus = busValues(t);
    for (var name in uniforms) {
      var u = uniforms[name], loc = u.loc;
      if (!loc) continue;
      if (u.type === gl.SAMPLER_2D) {
        gl.activeTexture(gl.TEXTURE0 + unit);
        if (targets[name]) gl.bindTexture(gl.TEXTURE_2D, targets[name].front.tex);
        else if (name === 'audioFFT') gl.bindTexture(gl.TEXTURE_2D, fftTex);
        else if (name === 'fontAtlasTex') gl.bindTexture(gl.TEXTURE_2D, fontAtlasTex);
        else if (name === 'varFontTex') gl.bindTexture(gl.TEXTURE_2D, varFontTex);
        else gl.bindTexture(gl.TEXTURE_2D, blackTex);
        gl.uniform1i(loc, unit); unit++;
        continue;
      }
      switch (name) {
        case 'TIME': gl.uniform1f(loc, t); break;
        case 'TIMEDELTA': gl.uniform1f(loc, dt); break;
        case 'RENDERSIZE': gl.uniform2f(loc, canvas.width, canvas.height); break;
        case 'PASSINDEX': gl.uniform1i(loc, pi); break;
        case 'FRAMEINDEX': gl.uniform1i(loc, frameIndex); break;
        case 'mousePos': gl.uniform2f(loc, mouse.x, mouse.y); break;
        case 'mouseDelta': gl.uniform2f(loc, mouse.dx, mouse.dy); break;
        case 'mouseDown': gl.uniform1f(loc, mouse.down); break;
        case 'pinchHold': case 'pinchHold2': gl.uniform1f(loc, 0); break;
        case 'inputActivity': gl.uniform1f(loc, mouse.down); break;
        case 'audioLevel': gl.uniform1f(loc, audio.level); break;
        case 'audioBass': gl.uniform1f(loc, audio.bass); break;
        case 'audioMid': gl.uniform1f(loc, audio.mid); break;
        case 'audioHigh': gl.uniform1f(loc, audio.high); break;
        case 'msgAge': gl.uniform1f(loc, -1.0); break;
        case 'audioPalShadow': gl.uniform3f(loc, 0.03, 0.02, 0.08); break;
        case 'audioPalMid': gl.uniform3f(loc, 0.35, 0.25, 0.60); break;
        case 'audioPalHigh': gl.uniform3f(loc, 0.85, 0.80, 0.95); break;
        case 'audioPalAccent': gl.uniform3f(loc, 1.00, 0.35, 0.50); break;
        case 'audioBarPhase': gl.uniform1f(loc, (t * 0.4) % 1); break;
        case 'audioBassTime': gl.uniform1f(loc, t * audio.bass); break;
        case 'audioArousal': gl.uniform1f(loc, Math.min(1, audio.level * 1.4)); break;
        case 'audioValence': gl.uniform1f(loc, 0.5); break;
        case 'useFontAtlas': gl.uniform1f(loc, 1.0); break;
        case '_transparentBg': gl.uniform1f(loc, 0); break;
        case 'scVideoMix': gl.uniform1f(loc, 0); break;
        default: {
          if (bus[name] != null) { gl.uniform1f(loc, bus[name]); break; }
          if (name.indexOf('IMG_SIZE_') === 0) { gl.uniform2f(loc, canvas.width, canvas.height); break; }
          if (name in textVals) { gl.uniform1f(loc, textVals[name]); break; }
          var inp = inputDefaults[name];
          if (inp) {
            var d = inp.DEFAULT;
            if (inp.TYPE === 'float') gl.uniform1f(loc, typeof d === 'number' ? d : 0.5);
            else if (inp.TYPE === 'bool') gl.uniform1f(loc, d ? 1 : 0);
            else if (inp.TYPE === 'long') gl.uniform1i(loc, typeof d === 'number' ? d : 0);
            else if (inp.TYPE === 'color') { var c4 = Array.isArray(d) ? d : [1, 1, 1, 1]; gl.uniform4f(loc, c4[0], c4[1], c4[2], c4[3] != null ? c4[3] : 1); }
            else if (inp.TYPE === 'point2D') { var p2 = Array.isArray(d) ? d : [0.5, 0.5]; gl.uniform2f(loc, p2[0], p2[1]); }
          } else if (u.type === gl.FLOAT) gl.uniform1f(loc, 0);
          else if (u.type === gl.FLOAT_VEC2) gl.uniform2f(loc, 0, 0);
          else if (u.type === gl.FLOAT_VEC3) gl.uniform3f(loc, 0, 0, 0);
          else if (u.type === gl.FLOAT_VEC4) gl.uniform4f(loc, 0, 0, 0, 0);
          else if (u.type === gl.INT) gl.uniform1i(loc, 0);
        }
      }
    }
  }

  var lastFrameT = 0;
  function frame(nowMs) {
    try {
      var t = (nowMs - start) / 1000;
      var dt = Math.min(0.1, t - lastFrameT); lastFrameT = t;
      if (!audio.nativeFed) syntheticAudio(t);
      for (var pi = 0; pi < passes.length; pi++) {
        var pass = passes[pi];
        setUniforms(t, dt, pi);
        if (pass.TARGET) gl.bindFramebuffer(gl.FRAMEBUFFER, targets[pass.TARGET].back.fbo);
        else gl.bindFramebuffer(gl.FRAMEBUFFER, null);
        gl.viewport(0, 0, canvas.width, canvas.height);
        gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
        if (pass.TARGET) {
          var tt = targets[pass.TARGET];
          var tmp = tt.front; tt.front = tt.back; tt.back = tmp;
        }
      }
      // If final pass wrote to a TARGET, blit it to screen via a cheap copy draw
      var last = passes[passes.length - 1];
      if (last.TARGET) {
        // draw the front texture to screen using the same program's final pass is
        // not possible generically; re-run final pass to screen instead
        setUniforms(t, dt, passes.length - 1);
        gl.bindFramebuffer(gl.FRAMEBUFFER, null);
        gl.viewport(0, 0, canvas.width, canvas.height);
        gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
      }
      frameIndex++;
    } catch (e) {
      if (!drawErr) { drawErr = 1; post("draw error: " + (e && e.message ? e.message : e)); }
    }
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}
</script>
</body>
</html>
