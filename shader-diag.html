<!DOCTYPE html>
<html>
<head><title>Shader Diagnostic</title></head>
<body style="background:#111;color:#0f0;font:14px monospace;padding:20px">
<h2>ShaderClaw Shader Diagnostic</h2>
<canvas id="c" width="400" height="300" style="border:1px solid #333"></canvas>
<pre id="log" style="max-height:80vh;overflow:auto"></pre>
<script>
const log = document.getElementById('log');
function say(msg, color) {
  const span = document.createElement('span');
  span.style.color = color || '#0f0';
  span.textContent = msg + '\n';
  log.appendChild(span);
  console.log(msg);
}

const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl', { antialias: false, preserveDrawingBuffer: true });

if (!gl) {
  say('FATAL: WebGL not available', '#f00');
} else {
  say('WebGL: OK');
  say('Renderer: ' + gl.getParameter(gl.RENDERER));

  const VERT = `attribute vec2 position;
varying vec2 isf_FragNormCoord;
void main() {
    isf_FragNormCoord = position * 0.5 + 0.5;
    gl_Position = vec4(position, 0.0, 1.0);
}`;

  // Test 1: Minimal shader (should always work)
  testShader('Test 1: Minimal', VERT, `precision highp float;
void main() { gl_FragColor = vec4(1.0, 0.0, 0.0, 1.0); }`);

  // Test 2: Header + simple main (like text shader without wrapper)
  testShader('Test 2: Header only', VERT, buildHeader([]) + `
void main() { gl_FragColor = vec4(0.0, 1.0, 0.0, 1.0); }`);

  // Test 3: Header + wrapper (like shader-category shaders)
  testShader('Test 3: Header + wrapper', VERT, buildHeader([]) + `
void _shaderMain() { gl_FragColor = vec4(0.0, 0.0, 1.0, 1.0); }
void main() {
    _shaderMain();
    vec2 _muv = gl_FragCoord.xy / RENDERSIZE.xy;
    vec2 _md = _muv - mousePos;
    _md.x *= RENDERSIZE.x / RENDERSIZE.y;
    float _mr = length(_md);
    float _mspot = exp(-_mr * _mr * 6.0) * 0.25;
    gl_FragColor.rgb += gl_FragColor.rgb * _mspot;
    if (_transparentBg > 0.5) {
        float _lum = dot(gl_FragColor.rgb, vec3(0.299, 0.587, 0.114));
        gl_FragColor.a = smoothstep(0.02, 0.15, _lum);
    }
}`);

  // Test 4: Actual laser.fs compilation
  fetch('shaders/laser.fs').then(r => r.text()).then(source => {
    const parsed = parseISF(source);
    const uniformLines = parsed.inputs.map(isfInputToUniform);
    const headerParts = buildHeaderParts(uniformLines);
    const header = headerParts.join('\n');
    const cleaned = parsed.glsl
      .replace(/#version\s+\d+.*/g, '')
      .replace(/#ifdef\s+GL_ES\s*\r?\nprecision\s+\w+\s+float\s*;\s*\r?\n#endif\s*\r?\n?/g, '');
    let body = header + cleaned;
    const mainRe = /void\s+main\s*\(\s*(void)?\s*\)/;
    say('laser.fs main() match: ' + mainRe.test(body));
    if (mainRe.test(body)) {
      body = body.replace(mainRe, 'void _shaderMain()');
      body += `
void main() {
    _shaderMain();
    vec2 _muv = gl_FragCoord.xy / RENDERSIZE.xy;
    vec2 _md = _muv - mousePos;
    _md.x *= RENDERSIZE.x / RENDERSIZE.y;
    float _mr = length(_md);
    float _mspot = exp(-_mr * _mr * 6.0) * 0.25;
    gl_FragColor.rgb += gl_FragColor.rgb * _mspot;
    if (_transparentBg > 0.5) {
        float _lum = dot(gl_FragColor.rgb, vec3(0.299, 0.587, 0.114));
        gl_FragColor.a = smoothstep(0.02, 0.15, _lum);
    }
}`;
    }
    testShader('Test 4: laser.fs (full pipeline)', VERT, body);

    // Test 5: laser.fs WITHOUT wrapper
    const body2 = header + cleaned;
    testShader('Test 5: laser.fs (no wrapper)', VERT, body2);

    // Test 6: Actually render a shader to canvas
    say('\n--- Render Test ---');
    const result = compileAndLink(VERT, body);
    if (result.ok) {
      gl.useProgram(result.prog);
      gl.clearColor(0, 0, 0, 1);
      gl.clear(gl.COLOR_BUFFER_BIT);
      // Set uniforms
      const tLoc = gl.getUniformLocation(result.prog, 'TIME');
      if (tLoc) gl.uniform1f(tLoc, 1.0);
      const rLoc = gl.getUniformLocation(result.prog, 'RENDERSIZE');
      if (rLoc) gl.uniform2f(rLoc, 400, 300);
      const mLoc = gl.getUniformLocation(result.prog, 'mousePos');
      if (mLoc) gl.uniform2f(mLoc, 0.5, 0.5);
      const tbLoc = gl.getUniformLocation(result.prog, '_transparentBg');
      if (tbLoc) gl.uniform1f(tbLoc, 0.0);
      // Set input defaults
      for (const inp of parsed.inputs) {
        const loc = gl.getUniformLocation(result.prog, inp.NAME);
        if (!loc) continue;
        if (inp.TYPE === 'float') gl.uniform1f(loc, inp.DEFAULT || 0);
        else if (inp.TYPE === 'color' && Array.isArray(inp.DEFAULT))
          gl.uniform4f(loc, inp.DEFAULT[0], inp.DEFAULT[1], inp.DEFAULT[2], inp.DEFAULT[3]);
      }
      // Fullscreen triangle
      const buf = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, buf);
      gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);
      const posLoc = gl.getAttribLocation(result.prog, 'position');
      gl.enableVertexAttribArray(posLoc);
      gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 0, 0);
      gl.drawArrays(gl.TRIANGLES, 0, 3);
      // Read pixel
      const px = new Uint8Array(4);
      gl.readPixels(200, 150, 1, 1, gl.RGBA, gl.UNSIGNED_BYTE, px);
      say('Center pixel: rgba(' + px[0] + ',' + px[1] + ',' + px[2] + ',' + px[3] + ')');
      if (px[0] > 0 || px[1] > 0 || px[2] > 0) {
        say('RENDER: OK — you should see laser colors on canvas', '#0f0');
      } else {
        say('RENDER: BLACK — shader compiled but output is black', '#ff0');
      }
    } else {
      say('Cannot render: compilation failed', '#f00');
    }
  }).catch(e => say('Fetch error: ' + e.message, '#f00'));
}

function testShader(name, vert, frag) {
  const result = compileAndLink(vert, frag);
  if (result.ok) {
    say(name + ': OK', '#0f0');
  } else {
    say(name + ': FAILED', '#f00');
    say('  ' + result.errors, '#f88');
  }
}

function compileAndLink(vertSrc, fragSrc) {
  const vs = gl.createShader(gl.VERTEX_SHADER);
  gl.shaderSource(vs, vertSrc);
  gl.compileShader(vs);
  if (!gl.getShaderParameter(vs, gl.COMPILE_STATUS)) {
    const log = gl.getShaderInfoLog(vs);
    gl.deleteShader(vs);
    return { ok: false, errors: 'Vertex: ' + log };
  }
  const fs = gl.createShader(gl.FRAGMENT_SHADER);
  gl.shaderSource(fs, fragSrc);
  gl.compileShader(fs);
  if (!gl.getShaderParameter(fs, gl.COMPILE_STATUS)) {
    const log = gl.getShaderInfoLog(fs);
    gl.deleteShader(vs);
    gl.deleteShader(fs);
    return { ok: false, errors: 'Fragment: ' + log };
  }
  const prog = gl.createProgram();
  gl.attachShader(prog, vs);
  gl.attachShader(prog, fs);
  gl.bindAttribLocation(prog, 0, 'position');
  gl.linkProgram(prog);
  gl.deleteShader(vs);
  gl.deleteShader(fs);
  if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
    const log = gl.getProgramInfoLog(prog);
    gl.deleteProgram(prog);
    return { ok: false, errors: 'Link: ' + log };
  }
  return { ok: true, prog };
}

function parseISF(source) {
  const match = source.match(/\/\*\s*(\{[\s\S]*?\})\s*\*\//);
  if (!match) return { meta: null, glsl: source.trim(), inputs: [] };
  try {
    const meta = JSON.parse(match[1]);
    const glsl = source.slice(source.indexOf(match[0]) + match[0].length).trim();
    return { meta, glsl, inputs: meta.INPUTS || [] };
  } catch (e) {
    return { meta: null, glsl: source.trim(), inputs: [] };
  }
}

function isfInputToUniform(input) {
  const t = input.TYPE;
  if (t === 'float') return 'uniform float ' + input.NAME + ';';
  if (t === 'color') return 'uniform vec4 ' + input.NAME + ';';
  if (t === 'bool') return 'uniform bool ' + input.NAME + ';';
  if (t === 'point2D') return 'uniform vec2 ' + input.NAME + ';';
  if (t === 'image') return 'uniform sampler2D ' + input.NAME + ';';
  if (t === 'long') return 'uniform float ' + input.NAME + ';';
  return '// unknown: ' + t;
}

function buildHeaderParts(uniformLines) {
  return [
    'precision highp float;',
    'uniform float TIME;',
    'uniform vec2 RENDERSIZE;',
    'uniform int PASSINDEX;',
    'uniform int FRAMEINDEX;',
    'varying vec2 isf_FragNormCoord;',
    '#define IMG_NORM_PIXEL(img, coord) texture2D(img, coord)',
    '#define IMG_PIXEL(img, coord) texture2D(img, coord / RENDERSIZE)',
    '#define IMG_THIS_PIXEL(img) texture2D(img, isf_FragNormCoord)',
    '#define IMG_THIS_NORM_PIXEL(img) texture2D(img, isf_FragNormCoord)',
    'uniform vec2 mousePos;',
    'uniform vec2 mouseDelta;',
    'uniform float mouseDown;',
    'uniform float pinchHold;',
    'uniform sampler2D audioFFT;',
    'uniform float audioLevel;',
    'uniform float audioBass;',
    'uniform float audioMid;',
    'uniform float audioHigh;',
    'uniform sampler2D varFontTex;',
    'uniform sampler2D fontAtlasTex;',
    'uniform float useFontAtlas;',
    'uniform float _voiceGlitch;',
    'uniform sampler2D mpHandLandmarks;',
    'uniform sampler2D mpFaceLandmarks;',
    'uniform sampler2D mpPoseLandmarks;',
    'uniform sampler2D mpSegMask;',
    'uniform float mpHandCount;',
    'uniform vec3 mpHandPos;',
    'uniform vec3 mpHandPos2;',
    'uniform float _transparentBg;',
    ...uniformLines,
    ''
  ];
}

function buildHeader(uniformLines) {
  return buildHeaderParts(uniformLines).join('\n');
}
</script>
</body>
</html>
